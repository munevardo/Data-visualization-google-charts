<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Data Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <header class="hero-header text-center">
        <div class="container">
            <h1 class="display-4 fw-bold text-danger">Catálogo de Netflix</h1>
            <p class="lead">Análisis interactivo de películas y series de televisión</p>
            <p>Jose Luis Munévar Diaz</p>
            <p>Liz Moreno</p>
            <p>Diana Gomez</p>
        </div>
    </header>

    <div class="container">
        <div class="row" id="dashboard">
            <div class="col-md-6">
                <div class="chart-container">
                    <div class="chart-title">Desafío 1: Distribución del Catálogo</div>
                    <div id="chart1" style="width: 100%; height: 350px;"></div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="chart-container">
                    <div class="chart-title">Desafío 2: Evolución de Incorporaciones Anuales</div>
                    <div id="chart2" style="width: 100%; height: 350px;"></div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="chart-container">
                    <div class="chart-title">Desafío 3: Top Países Productores</div>
                    <div class="controls">
                        <select id="countryFilter" class="form-select w-auto d-inline-block">
                            <option value="3">Top 3</option>
                            <option value="5" selected>Top 5</option>
                            <option value="10">Top 10</option>
                        </select>
                    </div>
                    <div id="chart3" style="width: 100%; height: 350px;"></div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="chart-container">
                    <div class="chart-title">Desafío 4: Géneros más Representativos</div>
                    <div class="controls">
                        <select id="genreFilter" class="form-select w-auto d-inline-block">
                            <option value="Movie" selected>Películas</option>
                            <option value="TV Show">Series de TV</option>
                        </select>
                    </div>
                    <div id="chart4" style="width: 100%; height: 350px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
